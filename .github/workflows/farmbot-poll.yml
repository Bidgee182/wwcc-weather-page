name: FarmBot Tank Poll

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes

  # Also run on code pushes (but not when the bot pushes data) — backup for when
  # GitHub's scheduler is paused after repeated failures
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'      # don't re-trigger when the bot commits sensor data
      - '**.md'

  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill tank historical data from start date'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backfill_lake:
        description: 'Backfill lake historical data from start date'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backfill_from:
        description: 'Backfill start date (YYYY-MM-DD). Default: 2025-01-01'
        required: false
        default: '2025-01-01'

concurrency:
  group: farmbot-poll
  cancel-in-progress: false   # let the current run finish; skip the queued one

jobs:
  poll:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit data/ back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests sendgrid

      - name: Run FarmBot poll / backfill
        env:
          FARMBOT_CLIENT_ID:      ${{ secrets.FARMBOT_CLIENT_ID }}
          FARMBOT_CLIENT_SECRET:  ${{ secrets.FARMBOT_CLIENT_SECRET }}
          FARMBOT_TANK_SID:       ${{ secrets.FARMBOT_TANK_SID }}
          FARMBOT_TANK_CAPACITY_L: '250000'
          FARMBOT_LAKE_SID:       ${{ secrets.FARMBOT_LAKE_SID }}
          LAKE_AHD_OFFSET:        '189.3746'
        run: |
          FROM="${{ github.event.inputs.backfill_from }}"
          FROM="${FROM:-2025-01-01}"
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python scripts/farmbot_poll.py --backfill --from "$FROM"
          elif [ "${{ github.event.inputs.backfill_lake }}" = "true" ]; then
            python scripts/farmbot_poll.py --backfill-lake --from "$FROM"
          else
            python scripts/farmbot_poll.py
          fi

      - name: Run lake level alert
        # Runs only on scheduled/manual poll (not backfill). continue-on-error so a
        # crash here never blocks the data commit step below.
        if: ${{ github.event.inputs.backfill != 'true' && github.event.inputs.backfill_lake != 'true' }}
        continue-on-error: true
        env:
          SENDGRID_API_KEY:           ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM:                 ${{ secrets.EMAIL_FROM }}
          EMAIL_GK_RECIPIENTS:        ${{ secrets.EMAIL_GK_RECIPIENTS }}
          EMAIL_COMMITTEE_RECIPIENTS: ${{ secrets.EMAIL_COMMITTEE_RECIPIENTS }}
        run: python scripts/lake_level_alert.py

      - name: Commit updated data to repository
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/farmbot_latest.json data/farmbot_readings.json \
                  data/farmbot_lake_latest.json data/farmbot_lake_readings.json \
                  data/farmbot_lake_weather.json data/farmbot_lake_rain_readings.json \
                  data/davis_weather_history.json data/lake_pump_zone.json
          git add data/lake_zone_history.csv data/email_log.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit and push"
          else
            git commit -m "FarmBot poll $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase -X theirs origin main
            git push
          fi
