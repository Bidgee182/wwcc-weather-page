name: Board Lake Update Email

on:
  schedule:
    # Weekly — Monday 7:00 AM AEST (UTC+10): Sunday 21:00 UTC
    - cron: '0 21 * * 0'
    # Weekly — Monday 7:00 AM AEDT (UTC+11): Sunday 20:00 UTC
    - cron: '0 20 * * 0'
    # Monthly — 1st of month 7:00 AM AEST: previous day 21:00 UTC
    - cron: '0 21 1 * *'
    # Monthly — 1st of month 7:00 AM AEDT: previous day 20:00 UTC
    - cron: '0 20 1 * *'
    # Weekly and monthly guards prevent double-sends.

  workflow_dispatch:
    inputs:
      report:
        description: 'Report type to send'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly
      dry_run:
        description: 'Build HTML preview only — do not send email'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test:
        description: 'Send test email to andrew@bidgeepumps.com.au only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Ignore sent guard and send regardless'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: board-email
  cancel-in-progress: false   # let the current run finish; skip the queued one

jobs:
  board-email:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run board email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_BOARD_TO:   ${{ secrets.EMAIL_BOARD_TO }}
          EMAIL_BOARD_CC:   ${{ secrets.EMAIL_BOARD_CC }}
          EMAIL_BOARD_BCC:  ${{ secrets.EMAIL_BOARD_BCC }}
          RECIPIENTS_KEY:   ${{ secrets.RECIPIENTS_KEY }}
        run: |
          ARGS=""
          # On the 1st of the month (scheduled) or when manually requesting monthly, add --monthly
          DAY=$(TZ='Australia/Sydney' date +%d)
          REPORT="${{ github.event.inputs.report }}"
          if [ "$DAY" = "01" ] || [ "$REPORT" = "monthly" ]; then
            ARGS="$ARGS --monthly"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/board_email.py $ARGS

      - name: Commit sent guards
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.test != 'true' }}
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/board_sent_week.json data/board_sent_month.json data/email_log.csv || true
          if git diff --staged --quiet; then
            echo "No guard changes to commit"
          else
            git commit -m "Board email sent guard $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push && break || echo "Push attempt $i failed, retrying..."
            done
          fi

      - name: Commit dry-run preview
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/reports/
          # Commit BEFORE pull --rebase: rebasing with a staged-but-uncommitted
          # index makes git die (exit 128) whenever another push lands mid-run
          if git diff --staged --quiet; then
            echo "No preview changes to commit"
          else
            git commit -m "Board email preview $(date -u +%Y-%m-%d)"
            ok=""
            for i in 1 2 3; do
              if git pull --rebase -X theirs origin main && git push; then ok=1; break; fi
              echo "Push attempt $i failed, retrying..."; sleep 5
            done
            [ -n "$ok" ]
          fi
