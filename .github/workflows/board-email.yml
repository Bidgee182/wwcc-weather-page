name: Board Lake Update Email

on:
  schedule:
    # 7:00 AM AEST (UTC+10) — AEDT off (Apr–Oct): Sunday 21:00 UTC = Monday 07:00 AEST
    - cron: '0 21 * * 0'
    # 7:00 AM AEDT (UTC+11) — AEDT on (Oct–Apr): Sunday 20:00 UTC = Monday 07:00 AEDT
    - cron: '0 20 * * 0'
    # Both fire year-round; the sent-this-week guard skips the second run.

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build HTML preview only — do not send email'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test:
        description: 'Send test email to andrew@bidgeepumps.com.au only'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Ignore sent-this-week guard and send regardless'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: board-email
  cancel-in-progress: false   # let the current run finish; skip the queued one

jobs:
  board-email:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run board email
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_BOARD_TO:   ${{ secrets.EMAIL_BOARD_TO }}
          EMAIL_BOARD_CC:   ${{ secrets.EMAIL_BOARD_CC }}
          EMAIL_BOARD_BCC:  ${{ secrets.EMAIL_BOARD_BCC }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python scripts/board_email.py $ARGS

      - name: Commit sent-week guard
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.test != 'true' }}
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/board_sent_week.json || true
          if git diff --staged --quiet; then
            echo "No guard changes to commit"
          else
            git pull --rebase -X theirs origin main
            git commit -m "Board email sent guard $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Commit dry-run preview
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/reports/
          git diff --staged --quiet || (git pull --rebase -X theirs origin main && git commit -m "Board email preview $(date -u +%Y-%m-%d)" && git push)
