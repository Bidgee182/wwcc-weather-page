name: FarmBot Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: List FarmBot sensors
        env:
          FARMBOT_CLIENT_ID:     ${{ secrets.FARMBOT_CLIENT_ID }}
          FARMBOT_CLIENT_SECRET: ${{ secrets.FARMBOT_CLIENT_SECRET }}
        run: |
          echo "--- Authenticating with FarmBot ---"
          TOKEN=$(curl -s -X POST \
            "https://fmbt-internal-production-ap-southeast-2.auth.ap-southeast-2.amazoncognito.com/oauth2/token" \
            -H "Authorization: Basic $(echo -n "${FARMBOT_CLIENT_ID}:${FARMBOT_CLIENT_SECRET}" | base64 -w 0)" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&scope=public-api%2Fget-sensor-data" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR:'+str(d)))")

          if [[ "$TOKEN" == ERROR* ]]; then
            echo "Auth failed: $TOKEN"
            exit 1
          fi
          echo "Auth successful."
          echo ""
          echo "--- Your sensors ---"
          curl -s \
            "https://api.myxbot-production-au.fmbt.io/public-api/v1/sensor" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            | python3 -m json.tool
