name: FarmBot Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Test FarmBot credentials and list sensors
        env:
          FARMBOT_CLIENT_ID:     ${{ secrets.FARMBOT_CLIENT_ID }}
          FARMBOT_CLIENT_SECRET: ${{ secrets.FARMBOT_CLIENT_SECRET }}
        run: |
          echo "=== Attempt 1: Basic auth with scope ==="
          B64=$(printf '%s' "${FARMBOT_CLIENT_ID}:${FARMBOT_CLIENT_SECRET}" | base64 -w 0)
          RESP=$(curl -s -X POST \
            "https://fmbt-internal-production-ap-southeast-2.auth.ap-southeast-2.amazoncognito.com/oauth2/token" \
            -H "Authorization: Basic ${B64}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "scope=public-api/get-sensor-data")
          echo "$RESP"
          TOKEN=$(echo "$RESP" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo ""
            echo "=== Attempt 2: No scope ==="
            RESP2=$(curl -s -X POST \
              "https://fmbt-internal-production-ap-southeast-2.auth.ap-southeast-2.amazoncognito.com/oauth2/token" \
              -H "Authorization: Basic ${B64}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials")
            echo "$RESP2"
            TOKEN=$(echo "$RESP2" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          fi

          if [ -z "$TOKEN" ]; then
            echo ""
            echo "=== All auth attempts failed. Credentials not activated yet. ==="
            exit 1
          fi

          echo ""
          echo "=== Auth SUCCESS - listing sensors ==="
          curl -s \
            "https://api.myxbot-production-au.fmbt.io/public-api/v1/sensor" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json"
