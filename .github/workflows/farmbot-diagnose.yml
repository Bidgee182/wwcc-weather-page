name: FarmBot Diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Test auth and list sensors
        env:
          FARMBOT_CLIENT_ID:     ${{ secrets.FARMBOT_CLIENT_ID }}
          FARMBOT_CLIENT_SECRET: ${{ secrets.FARMBOT_CLIENT_SECRET }}
          FARMBOT_TANK_SID:      ${{ secrets.FARMBOT_TANK_SID }}
        run: |
          echo "=== Authenticating ==="
          RESP=$(curl -s -X POST "https://auth.fmbt.io/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${FARMBOT_CLIENT_ID}" \
            --data-urlencode "client_secret=${FARMBOT_CLIENT_SECRET}")
          echo "$RESP"
          TOKEN=$(echo "$RESP" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

          if [ -z "$TOKEN" ]; then
            echo "Auth failed."
            exit 1
          fi
          echo "Auth SUCCESS."

          echo ""
          echo "=== Sensor list ==="
          curl -s "https://api.myxbot-production-au.fmbt.io/public-api/v1/sensor" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json"

          echo ""
          echo "=== Tank sensor details ==="
          curl -s "https://api.myxbot-production-au.fmbt.io/public-api/v1/sensor/${FARMBOT_TANK_SID}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json"

          echo ""
          echo "=== Latest tank sample ==="
          curl -s "https://api.myxbot-production-au.fmbt.io/public-api/v1/sensor/${FARMBOT_TANK_SID}/sample?pageSize=1&order=DESC" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json"
