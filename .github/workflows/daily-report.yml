name: WWCC Daily Weather Report

on:
  schedule:
    # Two entries so the report always arrives at ~6 AM Sydney time regardless of DST.
    # GitHub Actions cron jobs can be delayed 30–60 min during peak UTC hours.
    # Scheduling 50 min early (5:10 AM local) compensates for typical queue delay.
    # The script guards against duplicate runs on DST transition days.
    # AEST (UTC+10) Apr–Oct: 19:10 UTC = 5:10 AM AEST → arrives ~6:00 AM
    # AEDT (UTC+11) Oct–Apr: 18:10 UTC = 5:10 AM AEDT → arrives ~6:00 AM
    - cron: '10 19 * * *'   # 5:10 AM AEST (target delivery 6:00 AM)
    - cron: '10 18 * * *'   # 5:10 AM AEDT (target delivery 6:00 AM)

  # Manual trigger — resend or test emails
  workflow_dispatch:
    inputs:
      resend:
        description: 'Resend yesterday''s daily email using existing CSV data (no re-fetch)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test_email:
        description: 'Send test email to andrew@bidgeepumps.com.au with [TEST] prefix'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - daily
          - weekly
          - monthly
          - annual
          - meter_reading
          - meter_submission
          - lake_alert
          - all

jobs:
  daily-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily weather report
        env:
          DAVIS_DID:        ${{ secrets.DAVIS_DID }}
          DAVIS_PASS:       ${{ secrets.DAVIS_PASS }}
          DAVIS_TOKEN:      ${{ secrets.DAVIS_TOKEN }}
          DAVIS_V2_KEY:     ${{ secrets.DAVIS_V2_KEY }}
          DAVIS_V2_SECRET:  ${{ secrets.DAVIS_V2_SECRET }}
          DAVIS_V2_STATION: ${{ secrets.DAVIS_V2_STATION }}
          SENDGRID_API_KEY:          ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_GK_RECIPIENTS:       ${{ secrets.EMAIL_GK_RECIPIENTS }}
          EMAIL_COMMITTEE_RECIPIENTS: ${{ secrets.EMAIL_COMMITTEE_RECIPIENTS }}
          EMAIL_FROM:                ${{ secrets.EMAIL_FROM }}
        run: |
          if [ "${{ github.event.inputs.resend }}" = "true" ]; then
            python scripts/daily_report.py --resend
          elif [ "${{ github.event.inputs.test_email }}" = "lake_alert" ]; then
            python scripts/lake_level_alert.py --test
          elif [ -n "${{ github.event.inputs.test_email }}" ]; then
            python scripts/daily_report.py --test ${{ github.event.inputs.test_email }}
          else
            python scripts/daily_report.py
          fi

      - name: Commit updated data to repository
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/
          git diff --staged --quiet || git commit -m "Daily log $(date -u +%Y-%m-%d)"
          git push
