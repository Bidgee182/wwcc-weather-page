name: WWCC Daily Weather Report

on:
  schedule:
    # Two entries so the report always arrives at ~6 AM Sydney time regardless of DST.
    # GitHub Actions cron jobs can be delayed 30–60 min during peak UTC hours.
    # Scheduling 50 min early (5:10 AM local) compensates for typical queue delay.
    # The script guards against duplicate runs on DST transition days.
    # AEST (UTC+10) Apr–Oct: 19:10 UTC = 5:10 AM AEST → arrives ~6:00 AM
    # AEDT (UTC+11) Oct–Apr: 18:10 UTC = 5:10 AM AEDT → arrives ~6:00 AM
    - cron: '10 19 * * *'   # 5:10 AM AEST (target delivery 6:00 AM)
    - cron: '10 18 * * *'   # 5:10 AM AEDT (target delivery 6:00 AM)

  # Allow manual trigger from GitHub Actions tab for testing/backfill
  workflow_dispatch:
    inputs:
      diagnose:
        description: 'Print all Davis v2 API field names for yesterday (no CSV changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      resend:
        description: 'Resend email for today using existing CSV data (skip re-fetch)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backfill:
        description: 'Backfill missing historical dates into the CSV (no email sent)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      backfill_from:
        description: 'Backfill start date (YYYY-MM-DD). Leave blank to use 1 Sep of current season.'
        required: false
        default: ''
      backfill_to:
        description: 'Backfill end date (YYYY-MM-DD). Leave blank to use yesterday.'
        required: false
        default: ''
      backfill_force:
        description: 'Force reprocess ALL dates (use after CSV schema changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test_meter:
        description: 'Send test meter reminder email(s) to andrew@bidgeepumps.com.au (reading, submission, or all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - all
          - reading
          - submission

jobs:
  daily-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit the CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily weather report
        env:
          DAVIS_DID:        ${{ secrets.DAVIS_DID }}
          DAVIS_PASS:       ${{ secrets.DAVIS_PASS }}
          DAVIS_TOKEN:      ${{ secrets.DAVIS_TOKEN }}
          DAVIS_V2_KEY:     ${{ secrets.DAVIS_V2_KEY }}
          DAVIS_V2_SECRET:  ${{ secrets.DAVIS_V2_SECRET }}
          DAVIS_V2_STATION: ${{ secrets.DAVIS_V2_STATION }}
          SENDGRID_API_KEY:          ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_GK_RECIPIENTS:       ${{ secrets.EMAIL_GK_RECIPIENTS }}
          EMAIL_COMMITTEE_RECIPIENTS: ${{ secrets.EMAIL_COMMITTEE_RECIPIENTS }}
          EMAIL_FROM:                ${{ secrets.EMAIL_FROM }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            ARGS="--backfill"
            if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
              ARGS="$ARGS --from ${{ github.event.inputs.backfill_from }}"
            fi
            if [ -n "${{ github.event.inputs.backfill_to }}" ]; then
              ARGS="$ARGS --to ${{ github.event.inputs.backfill_to }}"
            fi
            if [ "${{ github.event.inputs.backfill_force }}" = "true" ]; then
              ARGS="$ARGS --force"
            fi
            python scripts/daily_report.py $ARGS
          elif [ "${{ github.event.inputs.diagnose }}" = "true" ]; then
            python scripts/daily_report.py --diagnose
          elif [ "${{ github.event.inputs.resend }}" = "true" ]; then
            python scripts/daily_report.py --resend
          elif [ -n "${{ github.event.inputs.test_meter }}" ]; then
            python scripts/daily_report.py --test-meter ${{ github.event.inputs.test_meter }}
          else
            python scripts/daily_report.py
          fi

      - name: Commit updated data to repository
        run: |
          git config user.name  "WWCC Weather Bot"
          git config user.email "bot@wwcc.com.au"
          git add data/
          git diff --staged --quiet || git commit -m "Daily log $(date -u +%Y-%m-%d)"
          git push
