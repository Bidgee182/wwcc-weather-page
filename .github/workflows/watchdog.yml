name: Watchdog

# Self-healing for transient failures: when a watched workflow fails, re-run
# its failed jobs (up to 3 attempts total) and email the admins the outcome.
# scripts/watchdog.py holds the decision logic, including the double-send
# guard: commit-step failures in email workflows are never auto-retried.

on:
  workflow_run:
    workflows:
      - "WWCC Daily Weather Report"
      - "Lake Albert Email Reports"
      - "Board Lake Update Email"
      - "FarmBot Tank Poll"
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  watchdog:
    # Act on failures, and on successes that only happened thanks to a retry
    # (those get the "self-healed" email)
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.run_attempt > 1)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Retry or notify
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          WF_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_RUN_URL: ${{ github.event.workflow_run.html_url }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python scripts/watchdog.py
